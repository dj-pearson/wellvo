name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'edge-functions/**'
      - '.github/workflows/edge-functions-deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/edge-functions

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: edge-functions
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-results.txt'
        continue-on-error: true
        id: trivy

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-${{ github.run_id }}
          path: trivy-results.txt
          retention-days: 30

      - name: Fail on HIGH/CRITICAL vulnerabilities
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "❌ HIGH or CRITICAL vulnerabilities found in Docker image!"
          cat trivy-results.txt
          exit 1

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: edge-functions
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment via webhook
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"}'

      - name: Verify deployment health
        run: |
          sleep 15
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.EDGE_FUNCTIONS_HEALTH_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Edge functions healthy"
              exit 0
            fi
            echo "Waiting for deployment... (attempt $i)"
            sleep 10
          done
          echo "⚠️ Health check timed out — deployment may still be starting"

  notify-failure:
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: Edge Functions Deploy — ${context.sha.substring(0, 7)}`,
              body: `## Deploy Failure\n\n- **Workflow:** Edge Functions Deploy\n- **Branch:** ${context.ref}\n- **Commit:** ${context.sha}\n- **Run:** [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nPlease investigate and fix.`,
              labels: ['ci-failure']
            });
