name: iOS E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'edge-functions/**'
      - '.github/workflows/ios-e2e-tests.yml'
  workflow_dispatch:

jobs:
  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          domain: "https://env.dpearsonmedia.com"
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: "prod"
          project-slug: "wellvo"
          export-type: "env"

      - name: Install dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Run API integration tests
        working-directory: e2e-tests
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          EDGE_FUNCTIONS_URL: https://functions.wellvo.net
          APPLE_OWNER_DEMO_EMAIL: ${{ env.APPLE_OWNER_DEMO_EMAIL }}
          APPLE_OWNER_DEMO_PASS: ${{ env.APPLE_OWNER_DEMO_PASS }}
          APPLE_RECEIVER_DEMO_EMAIL: ${{ env.APPLE_RECEIVER_DEMO_EMAIL }}
          APPLE_RECEIVER_DEMO_PASS: ${{ env.APPLE_RECEIVER_DEMO_PASS }}
        run: npm test

  ios-ui-tests:
    name: iOS UI Tests (Simulator)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          domain: "https://env.dpearsonmedia.com"
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: "prod"
          project-slug: "wellvo"
          export-type: "env"

      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -v beta | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Inject build configuration
        run: |
          # Write minimal xcconfig for simulator build (no code signing needed)
          {
            echo "// Wellvo Build Configuration (CI E2E Tests)"
            echo "CODE_SIGN_STYLE = Automatic"
            echo "CODE_SIGN_IDENTITY = -"
            echo "PRODUCT_BUNDLE_IDENTIFIER = com.wellvo.ios"
          } > ios/Wellvo/BuildConfig.xcconfig

          # Write Supabase config to Info.plist
          /usr/libexec/PlistBuddy -c "Set :SUPABASE_URL ${{ env.SUPABASE_URL }}" ios/Wellvo/Info.plist
          /usr/libexec/PlistBuddy -c "Set :SUPABASE_ANON_KEY ${{ env.SUPABASE_ANON_KEY }}" ios/Wellvo/Info.plist

      - name: Resolve Swift Package dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Wellvo.xcodeproj \
            -scheme Wellvo

      - name: Boot iOS Simulator
        run: |
          # Find an iPhone simulator
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || true)

          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found, creating one..."
            RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for r in reversed(data['runtimes']):
              if 'iOS' in r['name'] and r['isAvailable']:
                  print(r['identifier'])
                  sys.exit(0)
          ")
            DEVICE_ID=$(xcrun simctl create "iPhone 16" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME")
          fi

          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          echo "Booting simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Build for testing
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Wellvo.xcodeproj \
            -scheme Wellvo \
            -destination "id=${{ env.DEVICE_ID }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify || true

      - name: Run UI Tests
        working-directory: ios
        env:
          APPLE_OWNER_DEMO_EMAIL: ${{ env.APPLE_OWNER_DEMO_EMAIL }}
          APPLE_OWNER_DEMO_PASS: ${{ env.APPLE_OWNER_DEMO_PASS }}
          APPLE_RECEIVER_DEMO_EMAIL: ${{ env.APPLE_RECEIVER_DEMO_EMAIL }}
          APPLE_RECEIVER_DEMO_PASS: ${{ env.APPLE_RECEIVER_DEMO_PASS }}
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Wellvo.xcodeproj \
            -scheme Wellvo \
            -destination "id=${{ env.DEVICE_ID }}" \
            -only-testing:WellvoUITests \
            -resultBundlePath $RUNNER_TEMP/TestResults.xcresult \
            | xcbeautify || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults.xcresult
          retention-days: 7

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "${{ env.DEVICE_ID }}" 2>/dev/null || true
