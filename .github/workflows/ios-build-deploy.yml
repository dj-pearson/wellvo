name: iOS Build & Deploy to App Store

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testflight'
        type: choice
        options:
          - testflight
          - app-store
      version:
        description: 'Marketing version (e.g. 1.0.0). Leave empty to use value from project.'
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          domain: "https://env.dpearsonmedia.com"
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: "prod"
          project-slug: "wellvo"
          export-type: "env"

      - name: Select Xcode version
        run: |
          # Use latest stable Xcode (exclude betas)
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -v beta | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            # Fallback to any Xcode if no stable found
            XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ env.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ env.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ env.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Resolve Swift Package dependencies
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Wellvo.xcodeproj \
            -scheme Wellvo

      - name: Inject build configuration
        run: |
          # xcconfig uses first-definition-wins, so we must write a fresh file
          # (not append) to ensure CI values override the local placeholders
          {
            echo "// Wellvo Build Configuration (CI-generated)"
            echo "SUPABASE_URL = ${{ env.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY = ${{ env.SUPABASE_ANON_KEY }}"
            echo "CODE_SIGN_STYLE = Manual"
            echo "CODE_SIGN_IDENTITY = Apple Distribution"
            echo "DEVELOPMENT_TEAM = ${{ env.APPLE_TEAM_ID }}"
            echo "PROVISIONING_PROFILE_SPECIFIER = ${{ env.PROVISIONING_PROFILE_NAME }}"
            echo "PRODUCT_BUNDLE_IDENTIFIER = com.wellvo.ios"
          } > ios/Wellvo/BuildConfig.xcconfig
          echo "BuildConfig.xcconfig contents:"
          cat ios/Wellvo/BuildConfig.xcconfig

      - name: Set version and build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          VERSION="${{ inputs.version }}"

          # If no version provided, read from project
          if [ -z "$VERSION" ]; then
            VERSION=$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' ios/Wellvo.xcodeproj/project.pbxproj | head -1 | xargs)
          fi

          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "🏷️ Version: $VERSION ($BUILD_NUMBER)"

      - name: Build and archive
        working-directory: ios
        run: |
          xcodebuild archive \
            -project Wellvo.xcodeproj \
            -scheme Wellvo \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Wellvo.xcarchive \
            -destination "generic/platform=iOS" \
            MARKETING_VERSION="${{ env.APP_VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ env.BUILD_NUMBER }}" \
            | xcbeautify || true

      - name: Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ env.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.wellvo.ios</key>
                  <string>${{ env.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Setup App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          KEY_FILE=~/.private_keys/AuthKey_${{ env.ASC_KEY_ID }}.p8
          echo -n "${{ env.ASC_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > "$KEY_FILE"
          # Verify the key file looks like a valid PEM
          echo "Key file first line: $(head -1 "$KEY_FILE")"
          echo "Key file line count: $(wc -l < "$KEY_FILE")"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Wellvo.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ env.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ env.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ env.ASC_ISSUER_ID }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Wellvo.ipa" \
            --apiKey "${{ env.ASC_KEY_ID }}" \
            --apiIssuer "${{ env.ASC_ISSUER_ID }}"

      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # Notify on failure — create GitHub issue
  notify-failure:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: iOS Build & Deploy — ${context.sha.substring(0, 7)}`,
              body: `## Build Failure\n\n- **Workflow:** iOS Build & Deploy\n- **Branch:** ${context.ref}\n- **Commit:** ${context.sha}\n- **Build:** #${context.runNumber}\n- **Run:** [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nPlease investigate and fix.`,
              labels: ['ci-failure']
            });
